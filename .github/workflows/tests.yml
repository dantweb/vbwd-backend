name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  style:
    name: Style Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Black formatter check
        run: black --check --diff vbwd/ tests/

      - name: Run Flake8 style check
        run: flake8 vbwd/ tests/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Run Mypy type check
        run: mypy vbwd/ --ignore-missing-imports --no-error-summary

  unit:
    name: Unit Tests
    needs: style
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vbwd
          POSTGRES_PASSWORD: vbwd
          POSTGRES_DB: vbwd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install plugins
        run: |
          for plugin in analytics chat cms email ghrm mailchimp paypal stripe taro yookassa; do
            git clone --depth=1 https://github.com/VBWD-platform/vbwd-plugin-${plugin}.git plugins/${plugin}
          done

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql://vbwd:vbwd@localhost:5432/vbwd_test
        run: |
          pytest tests/unit/ -v --tb=short

      - name: Run unit tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql://vbwd:vbwd@localhost:5432/vbwd_test
        run: |
          pytest tests/unit/ --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  integration:
    name: Integration Tests
    needs: unit
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vbwd
          POSTGRES_PASSWORD: vbwd
          POSTGRES_DB: vbwd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install plugins
        run: |
          for plugin in analytics chat cms email ghrm mailchimp paypal stripe taro yookassa; do
            git clone --depth=1 https://github.com/VBWD-platform/vbwd-plugin-${plugin}.git plugins/${plugin}
          done

      - name: Run database migrations
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: postgresql://vbwd:vbwd@localhost:5432/vbwd_test
        run: |
          alembic upgrade head

      - name: Run integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql://vbwd:vbwd@localhost:5432/vbwd_test
        run: |
          pytest tests/integration/ -v --tb=short \
            --ignore=tests/integration/test_infrastructure.py
