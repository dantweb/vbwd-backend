# Alembic configuration file

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# version location specification; Core migrations live in alembic/versions.
# Plugin migrations live alongside their plugin code and are listed here so
# that `alembic upgrade head` (via `make migrate`) discovers them all.
# Uses %(here)s (directory of this file) to ensure absolute paths regardless
# of working directory. Separator is ':' (unix path separator).
version_path_separator = :
# Plugin migration directories — add new plugins here when they have migrations
version_locations = %(here)s/alembic/versions:%(here)s/plugins/taro/migrations/versions:%(here)s/plugins/cms/migrations/versions:%(here)s/plugins/ghrm/migrations/versions:%(here)s/plugins/booking/migrations/versions:%(here)s/plugins/chat/migrations/versions:%(here)s/plugins/shop/migrations/versions:%(here)s/plugins/discount/migrations/versions:%(here)s/plugins/meinchat/migrations/versions

# version_path_separator is set above alongside version_locations.

# set to 'true' to search source files recursively
# in each "version_locations" directory
# new in Alembic version 1.10
# recursive_version_locations = false

# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
