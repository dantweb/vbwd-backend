[pytest]
# Default: exclude integration tests from unit test run
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
testpaths = tests plugins
# Ignore integration tests by default (only run with make test-integration)
# Per-plugin integration dirs are ignored alongside the core one.
addopts = --ignore=tests/integration --ignore-glob=plugins/*/tests/integration
markers =
    integration: end-to-end specs that need a real DB / Redis / multi-thread setup
