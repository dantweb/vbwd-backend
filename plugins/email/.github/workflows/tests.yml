name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI — email
    runs-on: ubuntu-latest

    steps:
      # ── 1. Clone vbwd-backend ──────────────────────────────────────────────
      - name: Clone vbwd-backend
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-backend
          path: vbwd-backend

      # ── 2. Clone plugin directly into vbwd-backend/plugins/email ────
      - name: Clone plugin
        uses: actions/checkout@v4
        with:
          path: vbwd-backend/plugins/email

      # ── 3. Style checks (black · flake8 · mypy) ───────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: vbwd-backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r vbwd-backend/requirements.txt

      - name: Style check — Black
        run: |
          black --check --diff \
            vbwd-backend/plugins/email/ \
            --exclude='/(\.git|\.github|__pycache__|\.pytest_cache)/'

      - name: Style check — Flake8
        run: |
          flake8 vbwd-backend/plugins/email/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=.git,.github,__pycache__,.pytest_cache

      - name: Style check — Mypy
        run: |
          PLUGIN_SRC=vbwd-backend/plugins/email/src
          if [ -d "$PLUGIN_SRC" ]; then
            mypy "$PLUGIN_SRC" \
              --ignore-missing-imports \
              --no-error-summary \
              --python-version=3.11
          else
            echo "No src/ directory — skipping mypy."
          fi

      # ── 4. Start docker compose stack (API + postgres + redis) ────────────
      - name: Start services
        working-directory: vbwd-backend
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/v1/health > /dev/null 2>&1; then
              echo "API ready after ${i} attempts."
              break
            fi
            [ $i -eq 30 ] && echo "API did not become healthy." && exit 1
            sleep 3
          done

      # ── 5. Install and activate plugin ────────────────────────────────────
      - name: Enable plugin
        working-directory: vbwd-backend
        run: |
          docker compose exec -T api flask plugins enable email \
            && echo "Plugin email enabled." \
            || echo "Plugin email already enabled or not registerable — continuing."

      # ── 6. Unit tests ──────────────────────────────────────────────────────
      - name: Run unit tests
        working-directory: vbwd-backend
        run: |
          mkdir -p test-results
          if [ -d "plugins/email/tests/unit" ]; then
            TESTS_DIR="plugins/email/tests/unit/"
          elif [ -d "plugins/email/tests" ]; then
            TESTS_DIR="plugins/email/tests/"
            IGNORE="--ignore=plugins/email/tests/integration/"
          else
            echo "No unit tests — skipping."
            exit 0
          fi
          docker compose --profile test run --rm -T test \
            pytest $TESTS_DIR ${IGNORE:-} \
            -v --tb=short \
            --junit-xml=/app/test-results/unit.xml

      # ── 7. Integration tests ───────────────────────────────────────────────
      - name: Run integration tests
        if: always()
        working-directory: vbwd-backend
        run: |
          if [ -d "plugins/email/tests/integration" ]; then
            docker compose --profile test run --rm -T test \
              pytest plugins/email/tests/integration/ \
              -v --tb=short \
              --junit-xml=/app/test-results/integration.xml
          else
            echo "No integration tests — skipping."
          fi

      # ── 8. Upload artifacts ────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-email-${{ github.run_number }}
          path: vbwd-backend/test-results/
          if-no-files-found: ignore
          retention-days: 14

      # ── 9. Cleanup ─────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        working-directory: vbwd-backend
        run: docker compose down -v
